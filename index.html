<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestro Museo Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; color: #e5e5e5; scroll-behavior: smooth; }
        h1, h2, h3, .serif { font-family: 'Playfair Display', serif; }
        .museum-border { border: 1px solid rgba(255, 255, 255, 0.1); }
        .art-card { cursor: pointer; transition: all 0.4s ease; }
        .art-card:hover { transform: translateY(-5px); border-color: rgba(255, 255, 255, 0.4); background-color: rgba(255, 255, 255, 0.05); }
        .gradient-text { background: linear-gradient(45deg, #f3f4f6, #9ca3af); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
        .modal { display: none; position: fixed; inset: 0; z-index: 50; background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(8px); }
        .modal.active { display: flex; }
        /* Asegura que el video o imagen llenen el contenedor */
        .media-container img, .media-container video { width: 100%; height: 100%; object-fit: cover; }

        /* ESTILO DEL NUEVO BOTÓN */
        .btn-pregunta {
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }
        .btn-pregunta:hover {
            background: white;
            color: black;
            box-shadow: 0 0 20px rgba(255,255,255,0.1);
        }
    </style>
</head>
<body class="overflow-x-hidden">

    <section class="min-h-screen flex flex-col items-center justify-center relative px-4 text-center">
        <div class="absolute inset-0 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-zinc-800/20 via-black to-black"></div>
        <div class="z-10">
            <span class="uppercase tracking-[0.3em] text-sm text-gray-500 mb-4 block">Exhibición Temporal Permanente</span>
            <h1 class="text-6xl md:text-8xl font-bold mb-6 gradient-text">Museo de Nosotros</h1>
            <p class="text-xl md:text-2xl italic text-gray-400 serif">"Celebrando cada segundo desde aquel 06 de marzo"</p>
        </div>
        <div class="absolute bottom-10 z-10 animate-bounce"><i data-lucide="chevron-down" class="text-gray-500"></i></div>
    </section>

    <section class="py-20 bg-zinc-900/30 border-y border-zinc-800 text-center">
        <div class="container mx-auto px-4">
            <h2 class="text-3xl mb-4 serif">Tiempo en Exhibición</h2>
            <div id="counter" class="grid grid-cols-2 md:grid-cols-4 gap-8 max-w-4xl mx-auto mb-10">
                <div class="p-6 museum-border rounded-lg bg-black/20"><span id="days" class="text-4xl font-light block">0</span><span class="text-xs uppercase tracking-widest text-gray-500">Días</span></div>
                <div class="p-6 museum-border rounded-lg bg-black/20"><span id="hours" class="text-4xl font-light block">0</span><span class="text-xs uppercase tracking-widest text-gray-500">Horas</span></div>
                <div class="p-6 museum-border rounded-lg bg-black/20"><span id="minutes" class="text-4xl font-light block">0</span><span class="text-xs uppercase tracking-widest text-gray-500">Minutos</span></div>
                <div class="p-6 museum-border rounded-lg bg-black/20"><span id="seconds" class="text-4xl font-light block">0</span><span class="text-xs uppercase tracking-widest text-gray-500">Segundos</span></div>
            </div>

            <button onclick="abrirRazon()" class="btn-pregunta px-8 py-3 rounded-full text-xs uppercase tracking-[0.2em] inline-flex items-center gap-2">
                <i data-lucide="heart" class="w-4 h-4 text-red-500"></i>
                ¿Sabes por qué no me quieres dejar?
            </button>
        </div>
    </section>

    <section class="py-24 container mx-auto px-4">
        <div id="galleryGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12"></div>
    </section>

    <div id="artModal" class="modal items-center justify-center p-4">
        <div class="bg-zinc-900 w-full max-w-5xl rounded-lg overflow-hidden flex flex-col md:flex-row relative museum-border max-h-[90vh]">
            <button onclick="closeArt()" class="absolute top-4 right-4 z-20 bg-black/50 p-2 rounded-full hover:bg-white hover:text-black transition-all"><i data-lucide="x"></i></button>
            <div id="modalMediaContainer" class="w-full md:w-3/5 h-[300px] md:h-auto bg-black flex items-center justify-center overflow-hidden"></div>
            <div class="w-full md:w-2/5 p-8 md:p-12 flex flex-col justify-center bg-zinc-900 border-l border-zinc-800 overflow-y-auto">
                <span id="modalDate" class="text-xs uppercase tracking-[0.3em] text-gray-500 mb-4 block">Fecha</span>
                <h2 id="modalTitle" class="text-4xl serif mb-6 text-balance">Título</h2>
                <div class="h-px w-12 bg-white/30 mb-8"></div>
                <p id="modalDesc" class="text-gray-300 leading-relaxed text-lg italic">Descripción...</p>
                <div class="mt-12"><i data-lucide="heart" class="text-red-500 fill-red-500 inline-block mr-2"></i><span class="text-xs text-gray-500 uppercase tracking-widest">Colección Privada</span></div>
            </div>
        </div>
    </div>

    <div id="razonModal" class="modal items-center justify-center p-4">
        <div class="bg-zinc-900 w-full max-w-2xl rounded-lg overflow-hidden relative museum-border p-8 md:p-12 text-center">
            <button onclick="cerrarRazon()" class="absolute top-4 right-4 text-gray-500 hover:text-white transition-colors"><i data-lucide="x"></i></button>
            
            <div class="mb-8 flex justify-center">
                <div class="w-48 h-48 rounded-full overflow-hidden museum-border bg-black">
        <img src="foto16.jpg" class="w-full h-full object-cover">                </div>
            </div>

            <p id="textoRazon" class="text-2xl md:text-3xl serif italic leading-relaxed mb-10">Cargando razón...</p>
            
            <button onclick="abrirRazon()" class="text-xs uppercase tracking-widest text-zinc-500 hover:text-white transition-colors">
                Ver otra razón
            </button>
        </div>
    </div>

    <script>
        const artData = [
            { title: "Primer Mensaje", date: "10 Diciembre 2020", desc: "Tenemos que vernos jajaja:(", img: "foto.jpg" },
            { title: "Primera Invitacion", date: "13 Diciembre 2020", desc: "Ese dia habia llegado a hablar contigo y justo entre risas salio el tema de vernos por primera vez", img: "foto1.jpg" },
            { title: "Primeras Llamadas", date: "17 Diciembre 2020", desc: "¿Recuerdas esas largas llamadas, que solo crecian las ganas de conocernos cada vez mas", img: "foto2.png" },
            { title: "Primeros celos", date: "22 Diciembre 2020", desc: "Desde ahi tuve que darme cuenta que estabas loquita mi vida jaja, tus primeros celos", img: "foto3.jpg" },
            { title: "Primera Cita", date: "23 Diciembre 2020", desc: "Nuestra primera pelicula por nuestra app favorita y por donde salieron aun mas las ganas de vernos", img: "foto4.jpg" },
            { title: "El mosquito", date: "27 Diciembre 2020 ", desc: "Cualquier mosco es olvidado apenas muere, pero este no sera olvidado, fue de nuestras mejores noches chateando y riendo todo por el, como mataremos el mosco", img: "foto5.jpg" },
            { title: "Primera Vez en casa", date: "03 Enero 2021", desc: "Nada por decir unicamente... el amorcito tiene covid", img: "vide.mp4" },
            { title: "Primer Video", date: "25 Enero 2021", desc: "Ir a tu casa a comer lo que habias hecho sin duda alguna era la mejor cita", img: "video.mp4" },
            { title: "Primer Video", date: "06 MARZO 2021", desc: "Ese dia ibamos por primera vez a esperar el bus como oficialmente novios", img: "video1.mp4" },
            { title: "Primera Foto", date: "06 Marzo 2021", desc: "Nuestra primera foto como novios", img: "foto7.jpg" },
            { title: "Primera vez que te llevamos a la casa", date: "13 Marzo 2021", desc: "Fue la primera de muchas veces que se nos hizo tarde para devolvernos y no pasaba mas el bus", img: "video2.mp4" },
            { title: "Dia de preguntas", date: "17 Marzo 2021", desc: "Esa vez jugamos casi todo el dia a hacernos preguntas con ese filtro, como me encantas", img: "video3.mp4" },
            { title: "Dia de fotos", date: "24 marzo 2021", desc: "Ese dia nos tomamos muchas fotos mi amor jajaja", img: "foto8.jpg" },
            { title: "Primer mes juntos", date: "06 Abril 2021", desc: "Nuestra primer celebracion de pumplemes", img: "video4.mp4" },
            { title: "Primer salida juntos", date: "02 Mayo 2021", desc: "De este si tendremos varias fotos", img: "foto9.jpg" },
            { title: "Parque la Florida", date: "02 Mayo 2021", desc: "En la flota por primera vez juntos", img: "video5.mp4" },
            { title: "Cita con vino", date: "10 Mayo 2021", desc: "Nuestra cita con vino, de las mejores citas que hemos tenido mi amor", img: "foto10.jpg" },
            { title: "En El Mirador Suba", date: "22 Junio 2021", desc: "Ese dia el destino fue el mirador de suba ( porque el parque de los nevador estaba cerrada)", img: "video6.mp4" },
            { title: "Dia de Pizza", date: "05 Julio 2021", desc: "Nuestra primera vez comiendo pizza", img: "video7.mp4" },
            { title: "Dia de tenis", date: "07 Agosto 2021", desc: "Esta cita fue un poco distina nos fuimos a jugar unas buenas partidas de tenis", img: "foto11.jpg" },
            { title: "Partido de Tenis", date: "07 Agosto 2021", desc: "El partido con sus mejores momentos", img: "video8.mp4" },
            { title: "Monserrate", date: "15 Agosto 2021", desc: "Ese dia sabiamos que decian que pareja que subia monserrate terminaba jajajaj, nosotros supimos que ese dia estabamos hechos el uno para el otro", img: "foto12.jpg" },
            { title: "Tu y un burrito", date: "15 Agosto 2021", desc: "Tu con un burrito", img: "foto13.jpg" },
            { title: "Primer Viaje juntos", date: "04 Septiembre 2021", desc: "Ese dia nos fuimos de pumplemes y de pumpleaños tuyo, el mejor puto viaje de la vida", img: "foto14.jpg" },
            { title: "Un  noche de fiesta", date: "09 Octubre 2021", desc: "Ese dia fue muy bonito aunque termino con mi  celular dañandose", img: "video9.mp4" },
            { title: "Segundo Viaje Juntos", date: "14 Octubre 2021", desc: "Esea dia conocimos el mejor pueblito cerca de Bogota", img: "video10.mp4" },
            { title: "Cerveza cara", date: "15 Octubre 2021", desc: "Solo para recordar lo mal que hicimos las cuentas cuando estabamos tomados en la vega", img: "video11.mp4" },
            { title: "El dia que conociste a Noah", date: "19 Octubre 2021", desc: "Fue el dia que te lleve a que conocieras a la gorda preciosa", img: "foto15.jpg" },
            { title: "Otro dia de fiesta", date: "31 Octubre 2021", desc: "Ese no fue el dia que te vomitaste? jajajaj", img: "video12.mp4" },
            { title: "Primera Cita KFC", date: "06 Noviembre 2021", desc: "Fue el dia que probamos por primera vez este delicoso combo y despues no pudimos dejar de comerlo", img: "video13.mp4" },
            { title: "Primera Cita Salchis", date: "20 Noviembre 2021", desc: "La primera vez que conociste lo que es la delicia hecha salchipapas mi amor jeje", img: "video14.mp4" },
            { title: "Ultima vez", date: "26 Noviembre", desc: "Esta fue la ultima vez que nos vimos en este año porque te tenias que ir y todo quedaba en promesas el volver a vernos", img: "foto16.jpg" },
            { title: "Primera Vez", date: "20 Noviembre 2021", desc: "No sabes lo mucho que anhelaba que llegara este momento solo podia pensar en el volver a verte", img: "video15.mp4" }
        ];

        // --- LISTA DE RAZONES ---
        const razones = [
            "Porque nadie te va a mirar con la misma cara de bobo enamorado que yo.",
            "Porque somos el mejor equipo resolviendo crisis (como la del mosquito).",
            "Porque todavía me pongo nervioso antes de verte.",
            "Porque ya me sé todas tus mañas y aun así me encantan.",
            "Porque soy el único que sabe exactamente cómo te gusta el café.",
            "Porque me haces querer ser una mejor versión de mí mismo cada día.",
            "Porque juntos somos más fuertes que cualquier obstáculo.",
            "Porque guardo cada pequeño detalle que me has dado.",
            "Porque eres la curadora oficial de mis mejores días.",
            "Porque nadie te va a cuidar tanto cuando estés enferma.",
            "Porque nuestras risas tienen un sonido que no cambio por nada.",
            "Porque nuestra historia apenas está empezando.",
            "Porque me encanta cómo se siente tu mano con la mía.",
            "Porque me has visto en mis peores momentos y no te has ido.",
            "Porque Kaiser y Noah se quedarian sin su papà",
            "Porque no me imagino un mañana si no es despertando contigo.",
            "Porque conocemos nuestras versiones más reales y aun así nos elegimos.",
            "Porque ya invertí demasiado tiempo explicándote mis chistes malos.",
            "Porque soy el mejor matando mosquitos por ti en la madrugada.",
            "Porque me haces querer ser una mejor versión de mí mismo cada día.",
            "Porque hemos crecido juntos desde aquel diciembre de 2020."
        ];

        function getMediaHTML(src, isModal = false) {
            const isVideo = src.toLowerCase().endsWith('.mp4');
            if (isVideo) {
                return `<video src="${src}" ${isModal ? 'controls' : 'autoplay muted loop'} playsinline class="w-full h-full object-cover"></video>`;
            }
            return `<img src="${src}" alt="Obra" class="w-full h-full object-cover">`;
        }

        const galleryGrid = document.getElementById('galleryGrid');
        artData.forEach((art, index) => {
            galleryGrid.innerHTML += `
                <div class="art-card p-4 museum-border rounded-sm bg-zinc-900/50" onclick="openArt(${index})">
                    <div class="aspect-[3/4] bg-zinc-800 mb-6 relative overflow-hidden group media-container">
                        ${getMediaHTML(art.img)}
                        <div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity bg-black/40">
                             <span class="text-xs uppercase tracking-widest">Ver Obra</span>
                        </div>
                    </div>
                    <h3 class="text-xl mb-2 serif">${art.title}</h3>
                    <p class="text-sm text-gray-500 italic">${art.date}</p>
                </div>`;
        });

        lucide.createIcons();

        function openArt(i) {
            const a = artData[i];
            const container = document.getElementById('modalMediaContainer');
            container.innerHTML = getMediaHTML(a.img, true);
            document.getElementById('modalTitle').innerText = a.title;
            document.getElementById('modalDate').innerText = a.date;
            document.getElementById('modalDesc').innerText = a.desc;
            document.getElementById('artModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeArt() { 
            document.getElementById('artModal').classList.remove('active'); 
            document.getElementById('modalMediaContainer').innerHTML = ''; 
            document.body.style.overflow = 'auto'; 
        }

        // --- FUNCIONES NUEVAS ---
        function abrirRazon() {
            const index = Math.floor(Math.random() * razones.length);
            document.getElementById('textoRazon').innerText = `"${razones[index]}"`;
            document.getElementById('razonModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function cerrarRazon() {
            document.getElementById('razonModal').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        window.onclick = (e) => { 
            if(e.target.id === 'artModal') closeArt(); 
            if(e.target.id === 'razonModal') cerrarRazon();
        }
        
        const startDate = new Date(2021, 2, 6);
        function updateCounter() {
            const diff = new Date() - startDate;
            document.getElementById('days').innerText = Math.floor(diff / 864e5);
            document.getElementById('hours').innerText = Math.floor((diff / 36e5) % 24);
            document.getElementById('minutes').innerText = Math.floor((diff / 6e4) % 60);
            document.getElementById('seconds').innerText = Math.floor((diff / 1e3) % 60);
        }
        setInterval(updateCounter, 1000); updateCounter();
    </script>
</body>
</html>
